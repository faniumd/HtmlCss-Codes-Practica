<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flexbox + Grid Completo</title>
    <link rel="stylesheet" href="styleSeccionGrid.css">
</head>
<body>

<h1>Flexbox + Grid</h1>


<h2>Direcciones</h2>
<div class="contenedor row">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
</div>

<div class="contenedor row-reverse">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
</div>

<div class="contenedor column">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
</div>

<div class="contenedor column-reverse">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
</div>


<h2>Justify Content</h2>
<div class="contenedor justify">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
</div>


<h2>Align Items</h2>
<div class="contenedor align">
    <div class="caja big">1</div>
    <div class="caja">2</div>
    <div class="caja small">3</div>
</div>


<h2>Flex Wrap</h2>
<div class="contenedor wrap">
    <div class="caja">1</div><div class="caja">2</div><div class="caja">3</div>
    <div class="caja">4</div><div class="caja">5</div><div class="caja">6</div>
</div>


<h2>Flexibilidad</h2>
<div class="contenedor flex-props">
    <div class="caja o1">1</div>
    <div class="caja grow">2</div>
    <div class="caja basis">3</div>
</div>


<h2>GRID RESPONSIVE</h2>
<div class="grid">
    <div class="g g1">A</div>
    <div class="g g2">B</div>
    <div class="g">C</div>
    <div class="g">D</div>
</div>

<h2> Grid estilo Cubo Rubik</h2>

<div class="rubik">
    <div class="cell r"></div>
    <div class="cell gr"></div>
    <div class="cell b"></div>

    <div class="cell y"></div>
    <div class="cell w"></div>
    <div class="cell o"></div>

    <div class="cell p"></div>
    <div class="cell c"></div>
    <div class="cell l"></div>
</div>



</body>
</html>
